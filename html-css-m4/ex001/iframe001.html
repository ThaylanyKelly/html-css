<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe {
            height: 400px;
            width: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p> 
        Acessando o site do
        
        <!-- Tamanho padrão 300x150 -->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="400" scolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>
        
        para aprender a programar.
    </p>
    <p>
        O site da Thaylany 

        <iframe src="https://thaylanykelly.github.io/Projeto-de-Extensao3/" frameborder="0" height="400" width="500">
            do <a href="https://thaylanykelly.github.io/Projeto-de-Extensao3/" target="_blank"> Projeto de Extensão</a>
        </iframe> 
        
        também é bem legal
    </p>
</body>
</html>
