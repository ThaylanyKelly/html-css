<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assista ao vídeo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
        }
        h1 {
            color: #333;
        }
        video {
            margin-top: 20px;
            border-radius: 10px;
        }
        a.botao {
            display: inline-block;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        a.botao:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Assista ao vídeo</h1>

    <video src="video/video1.mp4" width="400" controls></video>

    <p>Mais vídeos como esse você 
        <a href="http://www.youtube.com/@espacovidabv" target="_blank">encontra aqui</a>.
    </p>

    <!-- Botão de voltar -->
    <a href="index.html" class="botao">⬅ Voltar</a>
</body>
</html>
